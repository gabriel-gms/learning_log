{% extends "learning_logs/base.html" %}

{% block content %}
    {% if form.errors %}
        <p>Seu email ou senha estão incorretos.</p>
    {% endif %}
    <form action="{% url 'users:login' %}" method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Entrar</button>
        <input type="hidden" name="next" value="{% url 'learning_logs:index' %}">
    </form>
{% endblock content %}
