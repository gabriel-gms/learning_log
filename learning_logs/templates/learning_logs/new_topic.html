{% extends "learning_logs/base.html" %}

{% load bootstrap3 %}

{% block header %}
    <h3>Adicionar novo tópico</h3>
{% endblock header %}

{% block content %}
<p>Adicione um novo tópico:</p>

<form action="{% url 'learning_logs:new_topic' %}" method="post">
    {% csrf_token %}
    {% bootstrap_form form %}
    {% buttons %}
        <button type="submit" class="btn btn-primary">Adicionar</button>
    {% endbuttons %}
</form>

{% endblock content %}
